<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contáctenos</title>
    <link rel="stylesheet" href="css/contactenos.css">

</head>
<body>
    <h1>Contáctenos</h1>
    <form action="registrar-info.php" method="get">
        <fieldset>
            <legend>Registre sus datos</legend>
            <br>
            <input type="text" name="nombres" placeholder="Ingrese sus nombres" class="input-width"> <br> <br>
            <br>
            <input type="text" name="apellidos" placeholder="Ingrese sus apellidos" class="input-width"><br><br>

            Ingrese su inquietud <br>
            <textarea name="pregunta" cols="40" rows="5" class="input-width"></textarea> <br>
            
            Género <br>
            <input type="radio" name="genero" value="Masculino">Masculino <br>
            <input type="radio" name="genero" value="Femenino">Femenino <br>
            <input type="radio" name="genero" value="Indeterminado">Indeterminado <br><br>

            Interes <br>
            <input type="checkbox" name="Interes" value="BKB B5S">BKB B5S<br>
            <input type="checkbox" name="Interes" value="FR SKATES FRX 80 BLACK">FR SKATES FRX 80 BLACK<br>
            <input type="checkbox" name="Interes" value="FLYING EAGLE F4 RAVEN">FLYING EAGLE F4 RAVEN<br>
            <input type="checkbox" name="Interes" value="FILA HOUDINI Y MADAME HOUDINI">FILA HOUDINI Y MADAME HOUDINI<br>
            <input type="checkbox" name="Interes" value="SFR PLASMA">SFR PLASMA<br>
            <input type="checkbox" name="Interes" value="POWERSLIDE KHAAN JR LTD">POWERSLIDE KHAAN JR LTD<br><br>

            Municipios <br>
            <select name="ciudad" class="input-width">
                <option value="Pitalito">Pitalito</option>
                <option value="San Agustin">San Agustín</option>
                <option value="Saladoblanco">Saladoblanco</option>
                <option value="Acevedo">Acevedo</option>
                <option value="Garzón">Garzón</option>
                <option value="Oporapa">Oporapa</option>
                <option value="Elías">Elías</option>
                <option value="Campo Alegre">Campo Alegre</option>
                <option value="Palestina">Palestina</option>
                <option value="Tello">Tello</option>
                <option value="Timaná">Timaná</option>
                <option value="Gigante">Gigante</option>
                <option value="Isnos">Isnos</option>



            </select> <br><br>
            <input type="submit" value="Enviar">


        </fieldset>
    </form>
</body>
</html>
